<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>omegabone</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Critical inline CSS: prevents blank white flash before JS/CSS loads -->
    <style>
      *,::before,::after{box-sizing:border-box}
      html{line-height:1.5;-webkit-text-size-adjust:100%}
      body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}
      #root{min-height:100vh}
      /* Skeleton shimmer for loading state */
      .page-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
      .page-loading::after{content:"";width:40px;height:40px;border:3px solid #e8f0fe;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <!-- Non-render-blocking font load: media=print trick swaps to all once loaded -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=optional"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=optional" />
    </noscript>
  </head>

  <body>
    <div id="root"><div class="page-loading"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
